services:
  cams_grabber:
    build: ./cams_grabber
    container_name: cams_grabber
    volumes:
      - ./output:/app/output   # persistent folder
      - ./cams_grabber/main_ssh.py:/app/main_ssh.py:cached
    environment:
      - CUDA_VISIBLE_DEVICES=1   # force GPU 1
    runtime: nvidia
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "pgrep", "-f", "main_ssh.py"]
      interval: 30s
      timeout: 10s
      retries: 3

  tg_bot:
    build: ./tg_bot
    container_name: tg_bot
    volumes:
      - ./output:/app/output   # share output images
      - ./tg_bot/bot.py:/app/bot.py:cached  # mount local bot.py
    env_file:
      - ./tg_bot/.env
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "pgrep", "-f", "bot.py"]
      interval: 30s
      timeout: 10s
      retries: 3

  sys_monitor:
    build: ./sys_monitor
    container_name: sys_monitor
    volumes:
      - ./output:/app/output
      - ./cams_grabber/main_ssh.py:/app/main_ssh.py:cached
      - ./sys_monitor/ups_status.txt:/app/ups_status.txt
    env_file:
      - ./tg_bot/.env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    gpus: all
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  web_viewer:
    image: nginx:alpine
    container_name: web_viewer
    volumes:
      - ./output:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
