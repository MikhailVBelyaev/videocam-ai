services:
  cams_grabber:
    build: ./cams_grabber
    container_name: cams_grabber
    volumes:
      - ./output:/app/output   # persistent folder
      - ./cams_grabber/main_ssh.py:/app/main_ssh.py:cached
    environment:
      - CUDA_VISIBLE_DEVICES=1   # force GPU 1
    runtime: nvidia
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "pgrep", "-f", "main_ssh.py"]
      interval: 30s
      timeout: 10s
      retries: 3

  tg_bot:
    build: ./tg_bot
    container_name: tg_bot
    volumes:
      - ./output:/app/output   # share output images
      - ./tg_bot/bot.py:/app/bot.py:cached  # mount local bot.py
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - ./tg_bot/.env
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from pathlib import Path; raise SystemExit(0 if 'bot.py' in Path('/proc/1/cmdline').read_text(errors='ignore') else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  sys_monitor:
    build: ./sys_monitor
    container_name: sys_monitor
    volumes:
      - ./output:/app/output
      - ./cams_grabber/main_ssh.py:/app/main_ssh.py:cached
      - ./sys_monitor/ups_status.txt:/app/ups_status.txt
    env_file:
      - ./tg_bot/.env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    gpus: all
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  web_viewer:
    build: ./web_viewer
    container_name: web_viewer
    volumes:
      - ./output:/app/output:ro
    ports:
      - "8082:5000"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/admin')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  qa_service:
    build: ./qa_service
    container_name: qa_service
    volumes:
      - ./output:/app/output:ro
      - ./qa_data:/app/data
    ports:
      - "8083:5001"
    environment:
      - CUDA_VISIBLE_DEVICES=2   # GPU 2 — dedicated to QA
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
    runtime: nvidia
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
