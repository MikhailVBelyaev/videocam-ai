services:
  cams_grabber_cam1:
    build: ./cams_grabber
    container_name: cams_grabber_cam1
    volumes:
      - ./output:/app/output
      - ./cams_grabber/main_ssh.py:/app/main_ssh.py:cached
    environment:
      - NVIDIA_VISIBLE_DEVICES=1   # GPU 1 by PCI bus order (02:00.0) — verified idle
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - CAMERA_ID=cam1
      - RTSP_URL=rtsp://admin:12311231aA%40@192.168.100.2:554/Streaming/Channels/101
    runtime: nvidia
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "pgrep", "-f", "main_ssh.py"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Camera 2 — add RTSP_URL when camera is physically connected, then:
  #   docker compose --profile cam2 up -d cams_grabber_cam2
  cams_grabber_cam2:
    profiles: ["cam2"]
    build: ./cams_grabber
    container_name: cams_grabber_cam2
    volumes:
      - ./output:/app/output
      - ./cams_grabber/main_ssh.py:/app/main_ssh.py:cached
    environment:
      - CUDA_VISIBLE_DEVICES=1
      - CAMERA_ID=cam2
      - RTSP_URL=rtsp://user:pass@192.168.100.X:554/Streaming/Channels/101
    runtime: nvidia
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "pgrep", "-f", "main_ssh.py"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Camera 3 — add RTSP_URL when camera is physically connected, then:
  #   docker compose --profile cam3 up -d cams_grabber_cam3
  cams_grabber_cam3:
    profiles: ["cam3"]
    build: ./cams_grabber
    container_name: cams_grabber_cam3
    volumes:
      - ./output:/app/output
      - ./cams_grabber/main_ssh.py:/app/main_ssh.py:cached
    environment:
      - CUDA_VISIBLE_DEVICES=1
      - CAMERA_ID=cam3
      - RTSP_URL=rtsp://user:pass@192.168.100.Y:554/Streaming/Channels/101
    runtime: nvidia
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "pgrep", "-f", "main_ssh.py"]
      interval: 30s
      timeout: 10s
      retries: 3

  tg_bot:
    build: ./tg_bot
    container_name: tg_bot
    volumes:
      - ./output:/app/output   # share output images
      - ./tg_bot/bot.py:/app/bot.py:cached  # mount local bot.py
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - ./tg_bot/.env
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from pathlib import Path; raise SystemExit(0 if 'bot.py' in Path('/proc/1/cmdline').read_text(errors='ignore') else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  sys_monitor:
    build: ./sys_monitor
    container_name: sys_monitor
    volumes:
      - ./output:/app/output
      - ./cams_grabber/main_ssh.py:/app/main_ssh.py:cached
      - ./sys_monitor/ups_status.txt:/app/ups_status.txt
    env_file:
      - ./tg_bot/.env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    gpus: all
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  web_viewer:
    build: ./web_viewer
    container_name: web_viewer
    volumes:
      - ./output:/app/output:ro
    ports:
      - "8082:5000"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/admin')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  qa_service:
    build: ./qa_service
    container_name: qa_service
    volumes:
      - ./output:/app/output:ro
      - ./qa_data:/app/data
    ports:
      - "8083:5001"
    environment:
      - NVIDIA_VISIBLE_DEVICES=2   # GPU 2 by PCI bus order (03:00.0) — dedicated to QA
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
    runtime: nvidia
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
